name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Fix Pulumi version conflict
        run: sudo rm -f /usr/local/bin/pulumi-language-nodejs

      - name: Install dependencies
        run: bun install

      - name: Validate Cloudflare secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_DEFAULT_ACCOUNT_ID"

      - name: Show SST diff
        run: bun run diff --stage=production --print-logs

      - name: Deploy with SST
        run: bun run deploy --stage=production --print-logs

      - name: Dump SST log on failure
        if: failure()
        run: |
          ls -R .sst || true
          if [ -f .sst/log/sst.log ]; then
            cat .sst/log/sst.log
          fi
